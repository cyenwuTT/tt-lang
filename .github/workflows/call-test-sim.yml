name: Test Simulation

on:
  workflow_dispatch:
  workflow_call:

jobs:
  test-sim:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dev-requirements.txt

      - name: Run Python simulation tests
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/python:${{ github.workspace }}/examples
          TTLANG_SIM_ONLY: "1"
        run: |
          pytest test/sim/ -v -n auto

      - name: Run matmul-tutorial tests (dry-run)
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/python:${{ github.workspace }}/examples
          TTLANG_SIM_ONLY: "1"
        run: |
          pytest test/sim/test_examples.py --run-matmul-tutorial-dry -m matmul_tutorial -v

      - name: Run Python API tests under simulator
        run: |
          python test/scripts/tt-lang-sim-pytest test/python/test_elementwise_ops.py -v
          python test/scripts/tt-lang-sim-pytest test/python/test_elementwise_shapes.py -v

      - name: Test source-tree launchers (bin/tt-lang-sim, bin/tt-lang-sim-stats)
        env:
          TTLANG_SIM_ONLY: "1"
        run: |
          bin/tt-lang-sim --help
          bin/tt-lang-sim-stats --help
