name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: "Docker image tag for the ird container."
        type: string
        required: true
      dry_run:
        description: "Skip tag enforcement and the PyPI upload (for pipeline testing)."
        type: boolean
        default: false

permissions:
  contents: read
  packages: read

jobs:
  preflight:
    name: "Verify release tag"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag_version: ${{ steps.parse.outputs.tag_version }}
    steps:
      - name: Checkout tt-lang
        uses: actions/checkout@v6

      - name: Require release tag
        id: parse
        if: ${{ !inputs.dry_run }}
        run: .github/scripts/require-release-tag.sh

  build-wheels:
    needs: preflight
    uses: ./.github/workflows/call-build-wheels.yml
    with:
      docker_tag: ${{ inputs.docker_tag }}

  publish:
    name: "Publish to PyPI"
    needs: [preflight, build-wheels]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.dry_run && '' || 'pypi' }}
    permissions:
      id-token: write

    steps:
      - name: Checkout tt-lang
        uses: actions/checkout@v6

      - name: Download wheels
        uses: actions/download-artifact@v5
        with:
          name: tt-lang-wheels
          path: dist/

      - name: List wheels
        run: ls -lh dist/

      - name: Verify wheel version matches tag
        if: ${{ !inputs.dry_run }}
        run: .github/scripts/verify-wheel-version.sh "${{ needs.preflight.outputs.tag_version }}" dist

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::Dry run complete; no upload performed."
          echo "Wheels that would have been published:"
          ls -lh dist/
