name: Configure Toolchain

on:
  workflow_call:
    outputs:
      cache-key:
        description: "Toolchain cache key"
        value: ${{ jobs.configure-deps.outputs.cache-key }}

permissions:
  contents: read

jobs:
  # Choose the runner based on whether the toolchain cache already exists.
  # On a cache hit, configure-deps only restores the cache, so the cheap
  # standard runner is enough. On a cache miss it must build LLVM + tt-metal
  # from scratch, which needs the large runner's disk and cores. A job's
  # runs-on is fixed when the job is scheduled, so a separate lookup job has
  # to decide the label before configure-deps starts. Both labels are
  # Ubuntu 24.04 (glibc 2.39), matching the ubuntu:24.04 Docker base image
  # that consumes the cached toolchain.
  select-runner:
    name: "Select runner"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      runner: ${{ steps.decide.outputs.runner }}
      cache-key: ${{ steps.submodule-shas.outputs.cache-key }}
    steps:
      - name: Checkout tt-lang (without submodules)
        uses: actions/checkout@v6

      - name: Extract submodule SHAs for cache keys
        id: submodule-shas
        run: |
          LLVM_SHA=$(git ls-tree HEAD third-party/llvm-project | awk '{print substr($3,1,7)}')
          TTMETAL_SHA=$(git ls-tree HEAD third-party/tt-metal | awk '{print substr($3,1,7)}')
          CACHE_KEY="Linux-toolchain_llvm-${LLVM_SHA}_ttmetal-${TTMETAL_SHA}"
          echo "cache-key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $CACHE_KEY"

      - name: Look up toolchain cache (no download)
        id: cache-lookup
        uses: actions/cache/restore@v5
        with:
          path: /opt/ttlang-toolchain
          key: ${{ steps.submodule-shas.outputs.cache-key }}
          lookup-only: true

      - name: Decide runner
        id: decide
        run: |
          if [ "${{ steps.cache-lookup.outputs.cache-hit }}" = "true" ]; then
            echo "runner=ubuntu-24.04" >> "$GITHUB_OUTPUT"
            echo "Toolchain cache hit -> standard runner (restore only)"
          else
            echo "runner=mlir-large-runner-lang" >> "$GITHUB_OUTPUT"
            echo "Toolchain cache miss -> large runner (cold LLVM + tt-metal build)"
          fi

  configure-deps:
    name: "Configure dependencies"
    needs: select-runner
    runs-on: ${{ needs.select-runner.outputs.runner }}
    timeout-minutes: 360

    outputs:
      cache-key: ${{ needs.select-runner.outputs.cache-key }}

    defaults:
      run:
        shell: bash

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2

    steps:
      - name: Checkout tt-lang (without submodules)
        uses: actions/checkout@v6

      - name: Restore toolchain cache
        id: cache-toolchain
        uses: actions/cache/restore@v5
        with:
          path: /opt/ttlang-toolchain
          key: ${{ needs.select-runner.outputs.cache-key }}

      # Everything below only runs on cache miss
      - name: Checkout submodules
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive --depth 1

      - name: Install system dependencies
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          # Make apt resilient to slow/intermittent mirrors (launchpad.net).
          # Persisted in apt.conf.d so subsequent steps (e.g. llvm.sh) inherit it.
          sudo tee /etc/apt/apt.conf.d/99-retries-timeout > /dev/null <<'EOF'
          Acquire::Retries "5";
          Acquire::http::Timeout "240";
          Acquire::https::Timeout "240";
          EOF
          sudo apt-get update
          sudo apt-get install -y \
              build-essential \
              libhwloc-dev libyaml-cpp-dev libboost-all-dev \
              libtbb-dev libcapstone-dev \
              cmake ninja-build ccache pkg-config \
              python3-venv python3-dev \
              wget zstd

      - name: Setup Python 3.12
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Clang 18
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          wget --tries=5 --timeout=120 --waitretry=10 https://apt.llvm.org/llvm.sh
          chmod u+x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          rm -f llvm.sh

      - name: Fix git safe directory for submodules
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: git config --global --add safe.directory '*'

      - name: Prepare toolchain directory
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: sudo install -d -o $(id -u) -g $(id -g) /opt/ttlang-toolchain

      - name: Configure (builds LLVM + tt-metal)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cmake -G Ninja -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DTTLANG_TOOLCHAIN_DIR=/opt/ttlang-toolchain \
              -DTTLANG_ENABLE_PERF_TRACE=ON \
              -DTTLANG_ACCEPT_TTMETAL_MISMATCH=ON

      - name: Install tt-metal into toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          bash scripts/install-ttmetal.sh \
              third-party/tt-metal \
              build/tt-metal \
              /opt/ttlang-toolchain/tt-metal

      - name: Remove venv from toolchain (not portable across machines)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: rm -rf /opt/ttlang-toolchain/venv

      - name: Save toolchain cache
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /opt/ttlang-toolchain
          key: ${{ needs.select-runner.outputs.cache-key }}
